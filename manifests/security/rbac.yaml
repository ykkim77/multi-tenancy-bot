apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-sa
  namespace: tenant-test-dept

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-role
  namespace: tenant-test-dept
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-role-binding
  namespace: tenant-test-dept
subjects:
- kind: ServiceAccount
  name: tenant-sa
  namespace: tenant-test-dept
roleRef:
  kind: Role
  name: tenant-role
  apiGroup: rbac.authorization.k8s.io

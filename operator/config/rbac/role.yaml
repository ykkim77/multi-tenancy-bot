---
# ClusterRole for the Agentic Operator (kcu-portal-operator).
# Permissions are intentionally scoped to the resources the controller
# actually creates — Namespace, ResourceQuota, LimitRange, NetworkPolicy,
# PriorityClass — plus the ChatSpace CRD itself.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
# Tenant namespaces and in-namespace policy objects
- apiGroups: [""]
  resources: [namespaces, resourcequotas, limitranges, configmaps]
  verbs: [get, list, watch, create, update, patch, delete]

# NetworkPolicy for HardIsolation
- apiGroups: [networking.k8s.io]
  resources: [networkpolicies]
  verbs: [get, list, watch, create, update, patch, delete]

# Cluster-scoped PriorityClasses managed by the Operator
- apiGroups: [scheduling.k8s.io]
  resources: [priorityclasses]
  verbs: [get, list, watch, create, update, patch]

# RoleBinding + Role for per-tenant RBAC (policy #6 in PCR metric).
# 'roles' list/watch is required by the controller-runtime informer cache
# when any rbac.authorization.k8s.io resource is watched.
- apiGroups: [rbac.authorization.k8s.io]
  resources: [roles, rolebindings]
  verbs: [get, list, watch, create, update, patch, delete]

# Allow binding the built-in 'view' ClusterRole to tenant ServiceAccounts.
# Kubernetes escalation-prevention requires the binder to have explicit
# 'bind' permission on the ClusterRole being referenced.
# resourceNames limits this to 'view' only (principle of least privilege).
- apiGroups: [rbac.authorization.k8s.io]
  resources: [clusterroles]
  verbs: [bind]
  resourceNames: [view]

# The ChatSpace CRD
- apiGroups: [portal.kcu.ac.kr]
  resources: [chatspaces]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [portal.kcu.ac.kr]
  resources: [chatspaces/status]
  verbs: [get, update, patch]
- apiGroups: [portal.kcu.ac.kr]
  resources: [chatspaces/finalizers]
  verbs: [update]

# Events for visibility
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]

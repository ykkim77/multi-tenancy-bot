---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.13.0
  name: chatspaces.portal.kcu.ac.kr
spec:
  group: portal.kcu.ac.kr
  names:
    kind: ChatSpace
    listKind: ChatSpaceList
    plural: chatspaces
    singular: chatspace
    shortNames:
    - cs
  scope: Cluster
  versions:
  - name: v1
    served: true
    storage: true
    additionalPrinterColumns:
    - jsonPath: .spec.tenantId
      name: Tenant
      type: string
    - jsonPath: .spec.tier
      name: Tier
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.namespace
      name: Namespace
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    schema:
      openAPIV3Schema:
        description: |
          ChatSpace is the Schema for the chatspaces API. It represents a tenant
          managed by the Agentic Operator: declaring a ChatSpace causes the
          Operator to autonomously provision a Namespace, ResourceQuota,
          LimitRange, and (optionally) NetworkPolicy, and to continuously
          re-balance quotas across all tenants.
        type: object
        properties:
          apiVersion: { type: string }
          kind: { type: string }
          metadata: { type: object }
          spec:
            type: object
            required: [tenantId]
            properties:
              tenantId:
                description: Unique identifier for the tenant.
                type: string
              tier:
                description: Tenant tier; drives default quota and isolation policy.
                type: string
                enum: [priority, standard, internal]
                default: standard
              owner:
                description: Owner email or team — purely informational.
                type: string
              resourceQuota:
                description: |
                  Optional overrides for the tier defaults. Empty fields fall back
                  to the Operator's tier-based defaults.
                type: object
                properties:
                  cpuRequests: { type: string }
                  memoryRequests: { type: string }
                  cpuLimits: { type: string }
                  memoryLimits: { type: string }
                  maxPods: { type: integer, format: int32 }
              agentic:
                description: |
                  Configures the autonomous decision-making behavior of the Operator.
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: true
                  hardIsolation:
                    type: boolean
                    default: true
                  reclaimIdleAfterSeconds:
                    type: integer
                    format: int32
                    default: 120
                  activeBoostFactor:
                    type: string
                    default: "1.5"
              outline:
                type: object
                properties:
                  enabled: { type: boolean }
                  storageSize: { type: string }
              qdrant:
                type: object
                properties:
                  enabled: { type: boolean }
                  collectionName: { type: string }
              embedding:
                type: object
                properties:
                  enabled: { type: boolean }
                  model: { type: string }
              rag:
                type: object
                properties:
                  enabled: { type: boolean }
                  model: { type: string }
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, Provisioning, Ready, Rebalancing, Failed]
              message:
                type: string
              namespace:
                type: string
              appliedQuota:
                type: object
                properties:
                  cpuRequests: { type: string }
                  memoryRequests: { type: string }
                  cpuLimits: { type: string }
                  memoryLimits: { type: string }
                  maxPods: { type: integer, format: int32 }
              agenticActions:
                description: Recent autonomous decisions made by the Operator.
                type: array
                items: { type: string }
              conditions:
                type: array
                items:
                  type: object
                  required: [type, status, lastTransitionTime, reason, message]
                  properties:
                    type: { type: string }
                    status: { type: string, enum: ["True", "False", Unknown] }
                    lastTransitionTime: { type: string, format: date-time }
                    reason: { type: string }
                    message: { type: string }
                    observedGeneration: { type: integer, format: int64 }
              resourceStatus:
                type: object
                properties:
                  outline: &compStatus
                    type: object
                    properties:
                      ready: { type: boolean }
                      message: { type: string }
                  qdrant: *compStatus
                  embedding: *compStatus
                  rag: *compStatus
              lastUpdated:
                type: string
                format: date-time
              observedGeneration:
                type: integer
                format: int64
    subresources:
      status: {}
